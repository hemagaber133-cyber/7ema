<!DOCTYPE html>
<html>

<head>
    <title>Course_Organizer_Add</title>
    <meta name="Description" content="This Is Educational Website For Courses" />
    <link rel="stylesheet" href="../css/style_task.css" />
</head>

<body>
    <header>
        <h1>Personal Course Organizer</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="html_task_courses.html">My Courses</a></li>
                <li><a href="html_task_add.html">Add Course</a></li>
                <li><a href="html_task_contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h2 class="ha">Add New Course</h2>
            <form>
                <label for="name">Course Name:</label>
                <input type="text" id="name" name="course_name" placeholder="Name..." required>
                <br>
                <label for="ins">Instructor:</label>
                <input type="text" id="ins" name="instructor" placeholder="Instructor Name..." required>
                <br>
                <label for="hours">Credit Hours:</label>
                <input type="number" id="hours" name="hours" placeholder="Number Of Hours..." required>
                <br>
                <label for="notes">Notes:</label>
                <textarea id="notes" name="notes" placeholder="Write Notes..."></textarea>
                <br>
                <input class="botton" style="border:none;" type="submit" value="Add Course"></input>
                <input class="botton" style="border:none;" type="reset" value="Reset"></input>
            </form>
        </section>
    </main>
     <footer>
        <p>&copy; 2026 Personal Course Organizer, Created By Abdalrahim_Gaber.</p>
    </footer>
</body>

</html>
